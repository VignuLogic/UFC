<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — UFC Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body style="background: #f8faf9;">

<nav class="navbar">
  <a href="/" class="nav-brand">
    <div class="nav-brand-icon">🥛</div>
    <div class="nav-brand-name">
      UFC Dashboard
      <span>Staff Portal</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/order-entry">Order Entry</a>
    <a href="/analytics" class="active">Analytics</a>
    <a href="/insights">Insights</a>
  </div>
  <a href="/order-entry" class="nav-cta">+ New Order</a>
</nav>

<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">📊 Sales Analytics</h1>
    <p class="page-sub">Real-time insights into your sales performance</p>
  </div>

  <div id="stats-grid" class="stats-grid"></div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="card-title">Daily Revenue</div>
      <canvas id="revenueChart" height="220"></canvas>
    </div>
    <div class="chart-card">
      <div class="card-title">Top 10 Products</div>
      <canvas id="productsChart" height="220"></canvas>
    </div>
    <div class="chart-card">
      <div class="card-title">Peak Hours</div>
      <canvas id="hoursChart" height="220"></canvas>
    </div>
    <div class="chart-card">
      <div class="card-title">Sales by Category</div>
      <canvas id="categoryChart" height="220"></canvas>
    </div>
  </div>
</div>

<script>
const GREEN = '#1a6b4a';
const GREEN_LIGHT = '#2d9b6f';
const GREEN_PALE = '#e8f5ee';

Chart.defaults.font.family = "'DM Sans', sans-serif";
Chart.defaults.color = '#888';

fetch('/get-analytics-data')
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      document.querySelector('.page-container').innerHTML += `
        <div class="card" style="text-align:center; padding:60px; color:var(--text-light);">
          <div style="font-size:48px; margin-bottom:16px;">📭</div>
          <div style="font-size:16px; font-weight:500; margin-bottom:8px;">${data.error}</div>
          <a href="/order-entry" class="btn-primary" style="margin-top:16px; display:inline-block;">Add First Order</a>
        </div>`;
      return;
    }

    // Stats
    const totalRev = data.daily_revenue.reduce((s, d) => s + d.Total, 0);
    const totalOrders = data.top_products.values.reduce((a, b) => a + b, 0);
    const avgOrder = totalOrders > 0 ? totalRev / totalOrders : 0;
    const bestProduct = data.top_products.labels[0] || 'N/A';

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value">₹${totalRev.toLocaleString('en-IN', {maximumFractionDigits:0})}</div><div class="stat-sub">All time</div></div>
      <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value">${totalOrders}</div><div class="stat-sub">Items sold</div></div>
      <div class="stat-card"><div class="stat-label">Avg Order Value</div><div class="stat-value">₹${avgOrder.toFixed(0)}</div><div class="stat-sub">Per item</div></div>
      <div class="stat-card"><div class="stat-label">Best Seller</div><div class="stat-value" style="font-size:16px; padding-top:4px;">${bestProduct}</div><div class="stat-sub">#1 product</div></div>`;

    // Daily Revenue
    new Chart(document.getElementById('revenueChart'), {
      type: 'line',
      data: {
        labels: data.daily_revenue.map(d => d.Date),
        datasets: [{
          label: 'Revenue (₹)',
          data: data.daily_revenue.map(d => d.Total),
          borderColor: GREEN, backgroundColor: GREEN_PALE,
          borderWidth: 2.5, fill: true, tension: 0.4,
          pointBackgroundColor: GREEN, pointRadius: 4
        }]
      },
      options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#f0f0f0' } }, x: { grid: { display: false } } } }
    });

    // Top Products
    new Chart(document.getElementById('productsChart'), {
      type: 'bar',
      data: {
        labels: data.top_products.labels,
        datasets: [{
          label: 'Qty Sold',
          data: data.top_products.values,
          backgroundColor: GREEN_PALE, borderColor: GREEN,
          borderWidth: 1.5, borderRadius: 8
        }]
      },
      options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#f0f0f0' } }, y: { grid: { display: false }, ticks: { font: { size: 11 } } } } }
    });

    // Peak Hours
    new Chart(document.getElementById('hoursChart'), {
      type: 'bar',
      data: {
        labels: data.peak_hours.map(h => `${h.Hour}:00`),
        datasets: [{
          label: 'Revenue (₹)',
          data: data.peak_hours.map(h => h.Total),
          backgroundColor: data.peak_hours.map(h => h.Total === Math.max(...data.peak_hours.map(x => x.Total)) ? GREEN : GREEN_PALE),
          borderRadius: 8
        }]
      },
      options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#f0f0f0' } }, x: { grid: { display: false } } } }
    });

    // Category
    new Chart(document.getElementById('categoryChart'), {
      type: 'doughnut',
      data: {
        labels: data.category_sales.map(c => c.Category),
        datasets: [{
          data: data.category_sales.map(c => c.Total),
          backgroundColor: ['#1a6b4a','#2d9b6f','#5dcaa5','#9fe1cb','#c2e8d4','#e8f5ee'],
          borderWidth: 0, hoverOffset: 6
        }]
      },
      options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 12 } } }, cutout: '65%' }
    });
  });
</script>
</body>
</html>
