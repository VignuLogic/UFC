<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Entry — UFC Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background: #f8faf9;">

<nav class="navbar">
  <a href="/" class="nav-brand">
    <div class="nav-brand-icon">🥛</div>
    <div class="nav-brand-name">
      UFC Dashboard
      <span>Staff Portal</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/order-entry" class="active">Order Entry</a>
    <a href="/analytics">Analytics</a>
    <a href="/insights">Insights</a>
  </div>
  <a href="/analytics" class="nav-cta">View Analytics</a>
</nav>

<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">📝 New Order Entry</h1>
    <p class="page-sub">Log a customer order to track sales and generate insights</p>
  </div>

  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px; align-items:start;">

    <!-- FORM -->
    <div class="card">
      <div class="card-title">Order Details</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Category</label>
          <select id="category" onchange="loadProducts()">
            <option value="">Select category...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Product</label>
          <select id="product" onchange="updatePrice()">
            <option value="">Select product...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" id="price" placeholder="Auto-filled" readonly
            style="background: var(--cream); cursor:not-allowed;">
        </div>
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="quantity" value="1" min="1" max="100" oninput="updateTotal()">
        </div>
        <div class="form-group">
          <label>Date & Time</label>
          <input type="datetime-local" id="datetime">
        </div>
        <div class="form-group">
          <label>Total (₹)</label>
          <input type="number" id="total" placeholder="0.00" readonly
            style="background: var(--cream); cursor:not-allowed; font-weight:600; color:var(--green);">
        </div>
        <div class="form-group full">
          <button class="btn-primary" onclick="submitOrder()" style="width:100%; padding:14px; font-size:15px; border-radius:12px;">
            Record Order
          </button>
        </div>
      </div>
    </div>

    <!-- ORDER SUMMARY -->
    <div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Order Summary</div>
        <div id="order-summary" style="text-align:center; padding:20px 0; color:var(--text-light); font-size:14px;">
          Select a product to see summary
        </div>
      </div>
      <div class="card">
        <div class="card-title">Recent Orders</div>
        <div id="recent-orders" style="font-size:13px; color:var(--text-light);">No recent orders yet.</div>
      </div>
    </div>
  </div>
</div>

<div class="success-toast" id="toast">✅ Order recorded successfully!</div>

<script>
let menuData = {};
let recentOrders = [];

// Set default datetime to now
document.getElementById('datetime').value = new Date().toISOString().slice(0,16);

fetch('/get-menu-data')
  .then(r => r.json())
  .then(data => {
    menuData = data;
    const catSel = document.getElementById('category');
    data.categories.forEach((cat, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = cat.name;
      catSel.appendChild(opt);
    });
  });

function loadProducts() {
  const catIdx = document.getElementById('category').value;
  const prodSel = document.getElementById('product');
  prodSel.innerHTML = '<option value="">Select product...</option>';
  document.getElementById('price').value = '';
  document.getElementById('total').value = '';
  updateSummary();
  if (catIdx === '') return;
  const cat = menuData.categories[catIdx];
  cat.items.forEach((item, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${item.name} — ₹${item.price}`;
    opt.dataset.price = item.price;
    opt.dataset.name = item.name;
    prodSel.appendChild(opt);
  });
}

function updatePrice() {
  const prodSel = document.getElementById('product');
  const selected = prodSel.options[prodSel.selectedIndex];
  if (!selected || !selected.dataset.price) { document.getElementById('price').value = ''; return; }
  document.getElementById('price').value = selected.dataset.price;
  updateTotal();
  updateSummary();
}

function updateTotal() {
  const price = parseFloat(document.getElementById('price').value) || 0;
  const qty = parseInt(document.getElementById('quantity').value) || 0;
  document.getElementById('total').value = (price * qty).toFixed(2);
  updateSummary();
}

function updateSummary() {
  const prodSel = document.getElementById('product');
  const selected = prodSel.options[prodSel.selectedIndex];
  const catSel = document.getElementById('category');
  const catSelected = catSel.options[catSel.selectedIndex];
  const price = parseFloat(document.getElementById('price').value) || 0;
  const qty = parseInt(document.getElementById('quantity').value) || 1;
  const el = document.getElementById('order-summary');

  if (!selected || !selected.dataset.price) {
    el.innerHTML = '<div style="text-align:center; padding:20px 0; color:var(--text-light); font-size:14px;">Select a product to see summary</div>';
    return;
  }
  el.innerHTML = `
    <div style="display:flex; flex-direction:column; gap:12px;">
      <div style="display:flex; justify-content:space-between; font-size:13px;">
        <span style="color:var(--text-light)">Product</span>
        <span style="font-weight:500">${selected.dataset.name}</span>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:13px;">
        <span style="color:var(--text-light)">Category</span>
        <span style="font-weight:500">${catSelected.textContent}</span>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:13px;">
        <span style="color:var(--text-light)">Unit Price</span>
        <span style="font-weight:500">₹${price}</span>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:13px;">
        <span style="color:var(--text-light)">Quantity</span>
        <span style="font-weight:500">${qty}</span>
      </div>
      <div style="border-top:1px solid var(--border); padding-top:12px; display:flex; justify-content:space-between;">
        <span style="font-weight:600">Total</span>
        <span style="font-weight:700; font-size:18px; color:var(--green)">₹${(price*qty).toFixed(2)}</span>
      </div>
    </div>`;
}

function submitOrder() {
  const catIdx = document.getElementById('category').value;
  const prodSel = document.getElementById('product');
  const selected = prodSel.options[prodSel.selectedIndex];
  const dt = document.getElementById('datetime').value;
  const qty = document.getElementById('quantity').value;
  const price = document.getElementById('price').value;

  if (!catIdx || !selected?.dataset?.price || !dt || !qty) {
    alert('Please fill in all fields.'); return;
  }
  const cat = menuData.categories[catIdx];

  fetch('/submit-order', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      datetime: dt,
      product_name: selected.dataset.name,
      category: cat.name,
      quantity: qty,
      price: price
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);

      recentOrders.unshift({
        name: selected.dataset.name,
        qty, price,
        total: (parseFloat(price) * parseInt(qty)).toFixed(2),
        time: new Date(dt).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'})
      });
      if (recentOrders.length > 5) recentOrders.pop();
      renderRecent();

      // Reset
      document.getElementById('product').value = '';
      document.getElementById('price').value = '';
      document.getElementById('total').value = '';
      document.getElementById('quantity').value = 1;
      document.getElementById('datetime').value = new Date().toISOString().slice(0,16);
      updateSummary();
    }
  });
}

function renderRecent() {
  const el = document.getElementById('recent-orders');
  if (!recentOrders.length) { el.innerHTML = '<div style="color:var(--text-light)">No recent orders yet.</div>'; return; }
  el.innerHTML = recentOrders.map(o => `
    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);">
      <div>
        <div style="font-weight:500; color:var(--text-dark)">${o.name}</div>
        <div style="font-size:11px; color:var(--text-light)">Qty: ${o.qty} · ${o.time}</div>
      </div>
      <div style="font-weight:600; color:var(--green)">₹${o.total}</div>
    </div>`).join('');
}
</script>
</body>
</html>
